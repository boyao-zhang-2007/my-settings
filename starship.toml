# ~/.config/starship.toml

# 提示符前是否空一行
add_newline = true

# 显示哪些模块，按顺序排列
format = """
$directory\
$git_branch\
$git_status\
$character"""

# 当前目录
[directory]
style = "bold cyan"
truncation_length = 3

# git 分支
[git_branch]
style = "bold purple"
format = "[$branch]($style) "

# git 状态（未提交更改等）
[git_status]
style = "bold blue"

# 命令提示符箭头
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
